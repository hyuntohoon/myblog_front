name: Deploy Front (S3+CF)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least privilege: default GITHUB_TOKEN is too broad; this workflow only reads this repo.
# (The workspace-contracts checkout uses its own WORKSPACE_GITHUB_TOKEN PAT, not GITHUB_TOKEN,
# and AWS deploy uses AWS_* secrets — so contents: read is sufficient.)
permissions:
  contents: read

# Serialize prod deploys so out-of-order pushes can't overwrite newer S3/CloudFront content.
concurrency:
  group: front-deploy-prod
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Checkout workspace contracts (for types-in-sync check)
        uses: actions/checkout@v4
        with:
          repository: hyuntohoon/myblog-workspace
          token: ${{ secrets.WORKSPACE_GITHUB_TOKEN }}
          sparse-checkout: docs/contracts
          sparse-checkout-cone-mode: false
          path: _workspace

      - name: Verify api.gen.ts is in sync with merged spec
        run: |
          pnpm exec openapi-typescript _workspace/docs/contracts/openapi.json -o src/lib/api.gen.ts.ci
          diff src/lib/api.gen.ts src/lib/api.gen.ts.ci || (echo "ERROR: api.gen.ts is out of sync. Run 'pnpm generate:types' and commit." && rm src/lib/api.gen.ts.ci && exit 1)
          rm src/lib/api.gen.ts.ci

      - name: Type check
        run: pnpm exec astro check

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

  deploy:
    needs: check
    # Production deploy is main-only. push already filters to main (on.push.branches), but
    # workflow_dispatch can be invoked against ANY ref, so guard the ref explicitly — otherwise
    # a dispatch from a feature branch would ship that branch's code to prod.
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Build Astro
        env:
          NODE_ENV: production
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
          PUBLIC_BACKEND_API_URL: ${{ vars.PUBLIC_API_URL }}
          PUBLIC_COGNITO_DOMAIN: ${{ secrets.PUBLIC_COGNITO_DOMAIN }}
          PUBLIC_COGNITO_CLIENT_ID: ${{ secrets.PUBLIC_COGNITO_CLIENT_ID }}
          PUBLIC_COGNITO_USER_POOL_ID: ${{ secrets.PUBLIC_COGNITO_USER_POOL_ID }}
          PUBLIC_COGNITO_REDIRECT_URI: ${{ secrets.PUBLIC_COGNITO_REDIRECT_URI }}
          # 3b-e: Spotify OAuth client id (public by design — it appears in the
          # authorize URL). Repo VARIABLE, owner-set; empty ⇒ the connect button
          # renders disabled and no authorize URL is built.
          PUBLIC_SPOTIFY_CLIENT_ID: ${{ vars.PUBLIC_SPOTIFY_CLIENT_ID }}
        run: pnpm build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 1) Hashed static assets — cache forever
      - name: Upload _astro/** (immutable)
        run: |
          aws s3 sync dist/_astro/ s3://${{ secrets.S3_BUCKET_WEB }}/_astro/ \
            --cache-control "public, max-age=31536000, immutable"

      # 2) HTML, XML, JSON — always revalidate. The unqualified --delete also
      #    purges the stale /pagefind/* objects (search is now the in-app global
      #    search; FEAT-global-search removed Pagefind).
      - name: Upload HTML/XML/JSON (no-cache)
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_WEB }} \
            --delete \
            --exclude "_astro/*" \
            --cache-control "no-cache"

      # 4) CloudFront cache invalidation
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DIST_ID }} \
            --paths "/*"
